apiVersion: agentwall.dev/v1
kind: AgentPolicy
metadata:
  name: moderate
  description: "Moderate policy — block CRITICAL/HIGH, sanitize MEDIUM"

spec:
  agents:
    "*":
      vectors:
        prompt_injection:
          enabled: true
          action: BLOCK
          classifiers: [prompt_shield, rule_engine]
          score_threshold: 0.7
        indirect_injection:
          enabled: true
          action: BLOCK
          classifiers: [prompt_shield_documents]
        obfuscation:
          enabled: true
          action: SANITIZE
          decoders: [base64, rot13, hex, unicode_normalize]
        jailbreak:
          enabled: true
          action: BLOCK
          score_threshold: 0.6
        prompt_leaking:
          enabled: true
          action: REDACT
          detection_modes: [outbound_overlap]
        mcp_poisoning:
          enabled: true
          action: BLOCK
          scan_tools_list: true
          scan_tool_responses: true
          forbidden_keys: ["SYSTEM NOTE", "CRITICAL OVERRIDE"]
          forbidden_patterns: ["<IMPORTANT>", "<SYSTEM>"]
        tool_scope:
          enabled: true
          action: BLOCK
          mode: allowlist
          tools: []
      output_validation:
        enabled: true
        action: REDACT
        detectors:
          system_prompt_leak:
            enabled: true
            similarity_threshold: 80
          secret_scanner:
            enabled: true
            patterns: [all]
            entropy_check: true
            entropy_threshold: 4.5
          pii:
            enabled: true
            categories: [Email, PhoneNumber]
            confidence_threshold: 0.85
      escalation:
        sentinel_min_severity: HIGH
        alert_threshold:
          count: 5
          window_seconds: 120
      audit:
        log_all_events: true
        log_payloads: false
        retention_days: 14
  agent_overrides: {}
