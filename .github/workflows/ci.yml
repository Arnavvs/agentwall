name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[all]" pytest pytest-asyncio pytest-cov ruff mypy

      - name: Lint (ruff)
        run: ruff check .

      - name: Typecheck (mypy)
        run: mypy agentwall --ignore-missing-imports

      - name: Test (pytest)
        run: pytest -q --cov=agentwall --cov-report=term-missing
